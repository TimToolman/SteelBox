name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build
        env:
          # Where the deployed frontend should reach the SteelBox API.
          # Set a repository variable named VITE_API_URL (Settings → Secrets
          # and variables → Actions → Variables) once the API is hosted;
          # left unset, the site falls back to http://localhost:4000.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          npm install
          npm run install:web
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - id: deployment
        uses: actions/deploy-pages@v4